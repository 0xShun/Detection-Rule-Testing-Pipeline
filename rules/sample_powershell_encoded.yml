title: Suspicious PowerShell Encoded Command Execution
id: 12345678-1234-1234-1234-123456789abc
status: experimental
author: Detection Engineer
date: 2025/01/01
description: Detects execution of PowerShell with encoded commands which may indicate obfuscated malicious activity
references:
    - https://attack.mitre.org/techniques/T1059/001/
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: \powershell.exe
        CommandLine|contains:
            - -enc
            - -encodedcommand
    condition: selection
falsepositives:
    - Legitimate administrative scripts
    - Software deployment tools
level: medium
tags:
    - attack.execution
    - attack.t1059.001